<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 할 일</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* 기본 설정 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 20px; background-color: #ffffff; color: #333; }
        ul { list-style: none; padding: 0; margin: 0; }
        
        /* 상단 헤더 & 달력 */
        .header { display: flex; align-items: center; justify-content: space-between; font-size: 18px; font-weight: 800; margin-bottom: 20px; }
        .today-badge { font-size: 12px; background: #F0F2F5; padding: 4px 12px; border-radius: 15px; color: #666; font-weight: 600; }
        
        .week-calendar { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .day-col { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; cursor: pointer; color: #666; }
        .day-col .date { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .day-col.selected { color: #FF9B6A; }
        .day-col.selected .date { background-color: #FF9B6A; color: white; font-weight: bold; }

        /* 섹션 공통 (먼슬리, 위클리) */
        .section-box { border-radius: 16px; padding: 18px; margin-bottom: 16px; }
        .section-header { font-weight: 800; font-size: 15px; margin-bottom: 15px; }
        
        /* 먼슬리 투두 (주황색) */
        .monthly { background-color: #FFC09F; color: #4A2B1D; }
        .monthly .checkbox { border-color: rgba(74, 43, 29, 0.3); }
        .monthly .todo-item.completed .checkbox { background-color: rgba(74, 43, 29, 0.5); border-color: transparent; }
        .monthly .add-item { color: rgba(74, 43, 29, 0.6); }

        /* 위클리 투두 (회색) */
        .weekly { background-color: #F4F5F7; color: #333; }
        
        /* 데일리 투두 */
        .daily-title { font-size: 15px; font-weight: 800; margin: 30px 0 15px 0; }
        .daily-list .todo-item { border-bottom: 1px solid #F0F2F5; padding-bottom: 12px; }
        
        /* 체크박스 및 리스트 아이템 디자인 */
        .todo-item { display: flex; align-items: flex-start; margin-bottom: 12px; font-size: 15px; cursor: pointer; line-height: 22px; }
        
        .checkbox { width: 20px; height: 20px; border: 1.5px solid #ccc; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s; margin-top: 1px; }
        
        /* 완료되었을 때 모양 */
        .todo-item.completed { opacity: 0.5; }
        .todo-item.completed .checkbox { background-color: #ccc; border-color: transparent; }
        .todo-item.completed .checkbox::after { content: '✓'; color: white; font-size: 12px; font-weight: bold; }
        
        /* 항목 추가 버튼 (투명한 체크박스 자리 차지) */
        .add-item { color: #999; cursor: pointer; font-size: 14px; margin-top: 5px; }
        .empty-space { width: 20px; margin-right: 12px; flex-shrink: 0; }

    </style>
</head>
<body>

    <div class="header">
        <div id="monthYearText">5월 2026 &lsaquo; &rsaquo;</div>
        <div class="today-badge">Today</div>
    </div>
    
    <div class="week-calendar" id="calendar"></div>

    <div class="section-box monthly">
        <div class="section-header">먼슬리 투두</div>
        <ul id="monthlyList"></ul>
    </div>

    <div class="section-box weekly">
        <div class="section-header">위클리 투두</div>
        <ul id="weeklyList"></ul>
    </div>

    <div class="daily-title">데일리 투두</div>
    <ul class="daily-list" id="dailyList"></ul>

    <script>
        // 데이터 저장소
        let todos = JSON.parse(localStorage.getItem('myTodos')) || { monthly: [], weekly: [], daily: {} };
        let selectedDate = new Date().toISOString().split('T')[0];

        // 1. 주간 캘린더 그리기
        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';
            const today = new Date();
            const firstDay = new Date(today.setDate(today.getDate() - today.getDay())); // 이번주 일요일
            
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            
            for(let i=0; i<7; i++) {
                let d = new Date(firstDay);
                d.setDate(d.getDate() + i);
                let dateStr = d.toISOString().split('T')[0];
                
                let col = document.createElement('div');
                col.className = `day-col ${dateStr === selectedDate ? 'selected' : ''}`;
                col.onclick = () => { selectedDate = dateStr; renderAll(); };
                col.innerHTML = `<div>${days[i]}</div><div class="date">${d.getDate()}</div>`;
                calendar.appendChild(col);
            }
        }

        // 2. 리스트 그리기 함수 (체크박스 + 추가 버튼 포함)
        function generateListHTML(type, listData) {
            let html = listData.map((t, i) => `
                <li class="todo-item ${t.done ? 'completed' : ''}" onclick="toggleTodo('${type}', ${i})">
                    <div class="checkbox"></div>
                    <div>${t.text}</div>
                </li>
            `).join('');
            
            // 각 리스트의 맨 마지막에 '항목 추가' 버튼 삽입
            html += `
                <li class="todo-item add-item" onclick="addTodo('${type}')">
                    <div class="empty-space"></div>
                    <div>항목 추가...</div>
                </li>
            `;
            return html;
        }

        // 3. 화면 업데이트
        function renderAll() {
            renderCalendar();
            
            document.getElementById('monthlyList').innerHTML = generateListHTML('monthly', todos.monthly);
            document.getElementById('weeklyList').innerHTML = generateListHTML('weekly', todos.weekly);
            
            let dailyTodos = todos.daily[selectedDate] || [];
            document.getElementById('dailyList').innerHTML = generateListHTML('daily', dailyTodos);
        }

        // 4. 할 일 추가
        function addTodo(type) {
            let text = prompt("새로운 할 일을 입력하세요:");
            if(!text) return;

            if(type === 'daily') {
                if(!todos.daily[selectedDate]) todos.daily[selectedDate] = [];
                todos.daily[selectedDate].push({ text: text, done: false });
            } else {
                todos[type].push({ text: text, done: false });
            }
            saveAndRender();
        }

        // 5. 할 일 완료 체크 (동그라미 채우기)
        function toggleTodo(type, index) {
            if(type === 'daily') {
                todos.daily[selectedDate][index].done = !todos.daily[selectedDate][index].done;
            } else {
                todos[type][index].done = !todos[type][index].done;
            }
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('myTodos', JSON.stringify(todos));
            renderAll();
        }

        // 앱 시작
        renderAll();
    </script>
</body>
</html>
